set -g default-shell /opt/homebrew/bin/fish
set -g detach-on-destroy off
set -g mouse on
set set-clipboard on
set extended-keys on
set -g allow-passthrough on # let apps (e.g. mdlive) pass Kitty graphics through to Ghostty

set -g base-index 1
set -g pane-base-index 1

set -g escape-time 0

# Status bar

set -g status-right "#[align=absolute-centre] #[fg=white,nobold]#{session_display_name} #[align=right]"
set -g status-interval 1
# Battery/date/time: shown only when the terminal is wide enough (>= 130 cols).
# On a narrow status line these drop and the meeting segment above is kept.
# set -ga status-right "#{?#{e|>=:#{client_width},130},#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\ 🔋 #(pmset -g batt | grep -Eo '[0-9]+%%' | head -1 | tr -d '%%')%% 📅 %d.%m.%y ⏰ %H:%M ,}"

set -g status-style bg=default,fg=black,bright
set -g status-left " "
# set -g status-right "#[fg=white,nobold]#S "
set -g status-right-length 150
set -g status-position bottom

# Window Buttons
set -g window-status-format "#{?window_zoomed_flag,[Zoomed] ,}#I: #W"
set -g window-status-current-format "#{?window_zoomed_flag,[Zoomed] ,}#I: #W"
set -g window-status-current-style fg=green
set -g window-status-bell-style fg=red
set -g renumber-windows on

# Window borders
set -g pane-border-lines simple
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=green

# Enable S-Enter and C-Enter modifiers
bind -n S-Enter send-keys Escape "[13;2u"
bind -n C-Enter send-keys Escape "[13;5u"

# set-environment -g XDG_CONFIG_HOME "/Users/cesar.enrique/.config"

# Keybindings

# Using vim keybindings for selection and copy
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'

# Next/Prev windows (Tabs)
bind-key -n C-Tab next-window
bind-key -n C-BTab previous-window

# Spliting panes
bind-key -n C-S-j split-window -v
bind-key -n C-S-k split-window -v -b
bind-key -n C-S-l split-window -h
bind-key -n C-S-h split-window -h -b

# Close panes
bind-key -n C-S-x kill-pane
bind-key -n C-S-o kill-pane -a

# Switch to last session
bind-key -n C-S-r switch-client -l

# Reload config
bind r display "Reloading Config..." \; source-file "/Users/cesar.enrique/.config/tmux/tmux.conf" \; display "Config reloaded!"

# Undercurl
set -g default-terminal "xterm-ghostty"
set -as terminal-overrides ',*256col*:RGB'
set -as terminal-overrides ',*:sitm=\E[3m' # Italics support for older ncurses
set -as terminal-overrides ',*:smxx=\E[9m' # Strikeout
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Sessions plugin
set -g @tws-key 'C-S-s'
set -g @tws-projects-dir '$HOME/Projects $HOME/.config $HOME/Exercism'
set -g @tws-strip-prefixes '$HOME/Projects/ghe.siriusxm.com $HOME/Projects'
set -g @tws-manual-sessions 'Notes:$HOME/Notes default:$HOME'
set -g @tws-icon-style 'nerd'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'mrjones2014/smart-splits.nvim'

# set -g @plugin 'caenrique/tmux-worktree-sessions'
run-shell '~/Projects/github.com/caenrique/tmux-worktree-sessions/main/tmux-worktree-sessions.tmux'

# Local tmux-calendar checkout. Its keybindings can be changed with the
# @tmux-calendar-*-key options before this line.
set -g @tmux-calendar-toggle-mock-key 'G'
set -g @tmux-calendar-notes-dir '~/Notes/meetings'
set -g @tmux-calendar-deduplicate-events 'on'
set -g @tmux-calendar-calendar-map '{"cesar.enrique@xebia.com/Calendar":{"name":"Xebia","color":"purple"},"cesar.enriqueramirez@siriusxm.com/Calendar":{"name":"SiriusXM","color":"blue"},"cesar.enrique@xebia.com/United Kingdom holidays":{"name":"United Kingdom holidays","color":"yellow"},"cesar.enriqueramirez@siriusxm.com/United Kingdom holidays":{"name":"United Kingdom holidays","color":"yellow"}}'
run-shell '$HOME/Projects/com.github.com/caenrique/tmux-calendar/tmux-calendar.tmux'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "/Users/cesar.enrique/.config/tmux/plugins/tpm/tpm"
